name: Chat Pagination Remove-For-Me Smoke

on:
  pull_request:
    paths:
      - backend/src/**
      - backend/scripts/e2e-message-actions-ci-smoke.mjs
      - backend/scripts/e2e-message-hardening-smoke.mjs
      - backend/package.json
      - backend/package-lock.json
      - backend/.env.example
      - scripts/chat_pagination_remove_for_me_smoke.mjs
      - .github/workflows/chat-pagination-remove-for-me-smoke.yml
  push:
    branches:
      - main
    paths:
      - backend/src/**
      - backend/scripts/e2e-message-actions-ci-smoke.mjs
      - backend/scripts/e2e-message-hardening-smoke.mjs
      - backend/package.json
      - backend/package-lock.json
      - backend/.env.example
      - scripts/chat_pagination_remove_for_me_smoke.mjs
      - .github/workflows/chat-pagination-remove-for-me-smoke.yml
  workflow_dispatch:

concurrency:
  group: chat-pagination-remove-for-me-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-chat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Wait for Mongo
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; then
              echo "Mongo is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Mongo did not become ready in time"
          exit 1

      - name: Start backend API
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_CONNECTIONSTRING: mongodb://127.0.0.1:27017/moji_ci_smoke
          ACCESS_TOKEN_SECRET: ci-access-token-secret
        run: |
          npm --prefix backend run start > backend-ci.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend API
        run: |
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:5001/api-docs/" >/dev/null; then
              echo "Backend API is ready"
              exit 0
            fi

            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend process exited unexpectedly"
              tail -n 200 backend-ci.log || true
              exit 1
            fi

            sleep 1
          done

          echo "Backend API did not become ready in time"
          tail -n 200 backend-ci.log || true
          exit 1

      - name: Run focused chat smoke
        env:
          SMOKE_API_BASE_URL: http://127.0.0.1:5001/api
        run: node scripts/chat_pagination_remove_for_me_smoke.mjs

      - name: Run message actions CI smoke
        env:
          BASE_URL: http://127.0.0.1:5001/api
          MONGODB_CONNECTIONSTRING: mongodb://127.0.0.1:27017/moji_ci_smoke
        run: npm --prefix backend run test:message-actions-ci

      - name: Show backend logs on failure
        if: failure()
        run: tail -n 200 backend-ci.log || true

      - name: Stop backend API
        if: always()
        run: |
          if [[ -n "${BACKEND_PID:-}" ]] && kill -0 "$BACKEND_PID" 2>/dev/null; then
            kill "$BACKEND_PID"
            wait "$BACKEND_PID" || true
          fi