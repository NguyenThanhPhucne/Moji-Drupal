name: Phase2 Broad Smoke Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: phase2-smoke-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phase2-broad-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Wait for Mongo
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; then
              echo "Mongo is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Mongo did not become ready in time"
          exit 1

      - name: Start backend API
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_CONNECTIONSTRING: mongodb://127.0.0.1:27017/moji_ci_phase2_nightly
          ACCESS_TOKEN_SECRET: ci-access-token-secret
        run: |
          npm --prefix backend run start > backend-phase2-nightly.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend API
        run: |
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:5001/api-docs/" >/dev/null; then
              echo "Backend API is ready"
              exit 0
            fi

            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend process exited unexpectedly"
              tail -n 200 backend-phase2-nightly.log || true
              exit 1
            fi

            sleep 1
          done

          echo "Backend API did not become ready in time"
          tail -n 200 backend-phase2-nightly.log || true
          exit 1

      - name: Run broad phase2 smoke
        env:
          SMOKE_API_BASE_URL: http://127.0.0.1:5001/api
        run: node scripts/phase2_smoke_api.mjs

      - name: Show backend logs on failure
        if: failure()
        run: tail -n 200 backend-phase2-nightly.log || true

      - name: Stop backend API
        if: always()
        run: |
          if [[ -n "${BACKEND_PID:-}" ]] && kill -0 "$BACKEND_PID" 2>/dev/null; then
            kill "$BACKEND_PID"
            wait "$BACKEND_PID" || true
          fi