name: Chat Search Jump Smoke

on:
  pull_request:
    paths:
      - frontend/src/components/chat/**
      - frontend/src/hooks/useMessageInput.ts
      - frontend/src/pages/ChatAppPage.tsx
      - frontend/src/services/searchService.ts
      - frontend/src/stores/useChatStore.ts
      - frontend/src/stores/useSocketStore.ts
      - frontend/scripts/global_search_jump_refresh_smoke.mjs
      - frontend/package.json
      - frontend/package-lock.json
      - backend/src/controllers/searchController.js
      - backend/src/routes/searchRoute.js
      - backend/src/controllers/messageController.js
      - backend/src/routes/messageRoute.js
      - backend/src/controllers/conversationController.js
      - backend/src/routes/conversationRoute.js
      - backend/src/models/Message.js
      - backend/src/server.js
      - backend/package.json
      - backend/package-lock.json
      - .github/workflows/chat-search-jump-smoke.yml
  push:
    branches:
      - main
    paths:
      - frontend/src/components/chat/**
      - frontend/src/hooks/useMessageInput.ts
      - frontend/src/pages/ChatAppPage.tsx
      - frontend/src/services/searchService.ts
      - frontend/src/stores/useChatStore.ts
      - frontend/src/stores/useSocketStore.ts
      - frontend/scripts/global_search_jump_refresh_smoke.mjs
      - frontend/package.json
      - frontend/package-lock.json
      - backend/src/controllers/searchController.js
      - backend/src/routes/searchRoute.js
      - backend/src/controllers/messageController.js
      - backend/src/routes/messageRoute.js
      - backend/src/controllers/conversationController.js
      - backend/src/routes/conversationRoute.js
      - backend/src/models/Message.js
      - backend/src/server.js
      - backend/package.json
      - backend/package-lock.json
      - .github/workflows/chat-search-jump-smoke.yml
  workflow_dispatch:

concurrency:
  group: chat-search-jump-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chat-search-jump-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browser
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Wait for Mongo
        run: |
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; then
              echo "Mongo is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Mongo did not become ready in time"
          exit 1

      - name: Start backend API
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_CONNECTIONSTRING: mongodb://127.0.0.1:27017/moji_ci_chat_search_smoke
          ACCESS_TOKEN_SECRET: ci-access-token-secret
          CLIENT_URL: http://127.0.0.1:5173
          CLIENT_URLS: http://127.0.0.1:5173,http://localhost:5173
          REFRESH_COOKIE_SECURE: "false"
        run: |
          npm --prefix backend run start > backend-chat-search-smoke.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend API
        run: |
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:5001/api-docs/" >/dev/null; then
              echo "Backend API is ready"
              exit 0
            fi

            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend process exited unexpectedly"
              tail -n 200 backend-chat-search-smoke.log || true
              exit 1
            fi

            sleep 1
          done

          echo "Backend API did not become ready in time"
          tail -n 200 backend-chat-search-smoke.log || true
          exit 1

      - name: Start frontend app
        run: |
          npm --prefix frontend run dev -- --host 127.0.0.1 --port 5173 > frontend-chat-search-smoke.log 2>&1 &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for frontend app
        run: |
          for i in {1..90}; do
            if curl -fsS "http://127.0.0.1:5173/" >/dev/null; then
              echo "Frontend app is ready"
              exit 0
            fi

            if ! kill -0 "$FRONTEND_PID" 2>/dev/null; then
              echo "Frontend process exited unexpectedly"
              tail -n 200 frontend-chat-search-smoke.log || true
              exit 1
            fi

            sleep 1
          done

          echo "Frontend app did not become ready in time"
          tail -n 200 frontend-chat-search-smoke.log || true
          exit 1

      - name: Run chat/search jump smoke
        env:
          APP_BASE_URL: http://127.0.0.1:5173
          API_BASE_URL: http://127.0.0.1:5001/api
        run: npm --prefix frontend run smoke:search-jump-refresh

      - name: Show backend logs on failure
        if: failure()
        run: tail -n 250 backend-chat-search-smoke.log || true

      - name: Show frontend logs on failure
        if: failure()
        run: tail -n 250 frontend-chat-search-smoke.log || true

      - name: Stop frontend app
        if: always()
        run: |
          if [[ -n "${FRONTEND_PID:-}" ]] && kill -0 "$FRONTEND_PID" 2>/dev/null; then
            kill "$FRONTEND_PID"
            wait "$FRONTEND_PID" || true
          fi

      - name: Stop backend API
        if: always()
        run: |
          if [[ -n "${BACKEND_PID:-}" ]] && kill -0 "$BACKEND_PID" 2>/dev/null; then
            kill "$BACKEND_PID"
            wait "$BACKEND_PID" || true
          fi